<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Agent Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-h: #21253a;
      --border: #2a2d3e;
      --border-acc: #3a3d52;
      --header-bg: #13151f;
      --text: #e2e4ef;
      --text-2: #7c8096;
      --text-dim: #4a4d62;
      --idle: #22c55e;
      --idle-bg: #052e16;
      --busy: #f59e0b;
      --busy-bg: #292524;
      --offline: #6b7280;
      --offline-bg: #111827;
      --accent: #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      height: 40px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .header-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .header-count {
      margin-left: auto;
      color: var(--text-2);
      font-size: 11px;
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Agent grid ── */
    .agent-section {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    #agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      transition: border-color 0.2s, opacity 0.2s;
    }

    .card:hover {
      border-color: var(--border-acc);
      background: var(--surface-h);
    }

    .card.offline {
      opacity: 0.6;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      flex-shrink: 0;
      color: #fff;
    }

    .agent-meta {
      flex: 1;
      min-width: 0;
    }

    .agent-name {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-role {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 1px;
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .status-badge::before {
      content: "";
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-badge.idle {
      background: var(--idle-bg);
      color: var(--idle);
    }

    .status-badge.idle::before {
      background: var(--idle);
    }

    .status-badge.busy {
      background: var(--busy-bg);
      color: var(--busy);
    }

    .status-badge.busy::before {
      background: var(--busy);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .status-badge.offline {
      background: var(--offline-bg);
      color: var(--offline);
    }

    .status-badge.offline::before {
      background: var(--offline);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Current task ── */
    .current-task {
      font-size: 11px;
      color: var(--text-2);
      min-height: 16px;
      line-height: 1.4;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .current-task.active {
      color: var(--text);
    }

    /* ── Expand toggle ── */
    .expand-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
      border: none;
      background: none;
      color: var(--text-dim);
    }

    .expand-toggle:hover {
      color: var(--text-2);
    }

    .expand-toggle .chevron {
      transition: transform 0.2s;
      font-size: 9px;
    }

    .expand-toggle.open .chevron {
      transform: rotate(180deg);
    }

    /* ── Task history ── */
    .task-history {
      display: none;
      margin-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .task-history.open {
      display: block;
    }

    .task-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-row:last-child {
      border-bottom: none;
    }

    .task-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .task-status-dot.completed { background: var(--idle); }
    .task-status-dot.failed { background: #ef4444; }
    .task-status-dot.in_progress { background: var(--busy); }
    .task-status-dot.pending { background: var(--text-dim); }

    .task-desc {
      flex: 1;
      font-size: 10px;
      color: var(--text-2);
      line-height: 1.4;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-ts {
      font-size: 9px;
      color: var(--text-dim);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .no-history {
      font-size: 10px;
      color: var(--text-dim);
      padding: 4px 0;
    }

    /* ── Feed panel ── */
    .feed-panel {
      width: 340px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .feed-header {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    #event-feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .feed-item {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.3s ease;
    }

    .feed-item:last-child {
      border-bottom: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .feed-item-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }

    .feed-agent-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .feed-agent-name {
      font-weight: 600;
      font-size: 11px;
    }

    .feed-badge {
      margin-left: auto;
    }

    .feed-message {
      font-size: 11px;
      color: var(--text-2);
      line-height: 1.4;
      padding-left: 13px;
    }

    .feed-time {
      font-size: 9px;
      color: var(--text-dim);
      padding-left: 13px;
      margin-top: 2px;
    }

    .feed-empty {
      padding: 20px 14px;
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-acc); border-radius: 2px; }

    /* ── Empty state ── */
    .empty-grid {
      grid-column: 1 / -1;
      padding: 40px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
    }

    .connection-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-dim);
    }

    .conn-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--offline);
    }

    .conn-dot.connected {
      background: var(--idle);
    }
  </style>
</head>
<body>

  <header>
    <div class="header-dot"></div>
    <h1>Multi-Agent Dashboard</h1>
    <span id="agent-count" class="header-count">0 agents</span>
    <div class="connection-status">
      <div id="conn-dot" class="conn-dot"></div>
      <span id="conn-label">Connecting…</span>
    </div>
  </header>

  <div class="main">
    <section class="agent-section">
      <div id="agent-grid">
        <div class="empty-grid">Loading agents…</div>
      </div>
    </section>

    <aside class="feed-panel">
      <div class="feed-header">Live Feed</div>
      <div id="event-feed">
        <div class="feed-empty">Waiting for events…</div>
      </div>
    </aside>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let agentsMap = {};         // agentId → agent data
    const MAX_FEED = 20;
    let feedCount = 0;

    // ── Helpers ────────────────────────────────────────────────────────────
    function initials(name) {
      return name.split(/[\s-_]+/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2);
    }

    function relativeTime(isoString) {
      const diff = Date.now() - new Date(isoString).getTime();
      const s = Math.floor(diff / 1000);
      if (s < 60) return `${s}s ago`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      return `${h}h ago`;
    }

    function statusDotClass(st) {
      if (st === 'completed') return 'completed';
      if (st === 'failed') return 'failed';
      if (st === 'in_progress') return 'in_progress';
      return 'pending';
    }

    // ── Card rendering ─────────────────────────────────────────────────────
    function buildCard(agent) {
      const isOffline = !agent.status || agent.status === 'offline';
      const statusClass = isOffline ? 'offline' : agent.status;
      const statusLabel = isOffline ? 'offline' : agent.status;
      const taskText = agent.currentTask || (isOffline ? 'Offline' : 'Waiting for task…');
      const taskClass = agent.currentTask ? 'current-task active' : 'current-task';
      const cardClass = isOffline ? 'card offline' : 'card';
      const color = agent.color || '#6b7280';

      const historyRows = (agent.taskHistory || []).map(t => `
        <div class="task-row">
          <div class="task-status-dot ${statusDotClass(t.status)}"></div>
          <div class="task-desc" title="${escapeHtml(t.desc)}">${escapeHtml(t.desc)}</div>
          <div class="task-ts">${relativeTime(t.ts)}</div>
        </div>
      `).join('');

      const historyContent = historyRows
        ? historyRows
        : '<div class="no-history">No tasks yet</div>';

      return `
        <div id="card-${agent.agentId}" class="${cardClass}">
          <div class="card-header">
            <div class="avatar" style="background:${color}20;color:${color};">${initials(agent.agentName)}</div>
            <div class="agent-meta">
              <div class="agent-name">${escapeHtml(agent.agentName)}</div>
              <div class="agent-role">${escapeHtml(agent.role.replace(/_/g, ' '))}</div>
            </div>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
          </div>
          <div class="${taskClass}" title="${escapeHtml(taskText)}">${escapeHtml(taskText)}</div>
          <button class="expand-toggle" onclick="window.toggleCard('card-${agent.agentId}', this)">
            <span>Task history</span>
            <span class="chevron">▼</span>
          </button>
          <div class="task-history">
            ${historyContent}
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderAgents(agents) {
      const grid = document.getElementById('agent-grid');
      if (!agents || agents.length === 0) {
        grid.innerHTML = '<div class="empty-grid">No agents registered yet.</div>';
        document.getElementById('agent-count').textContent = '0 agents';
        return;
      }

      // Preserve which cards are currently expanded
      const expandedIds = new Set(
        Array.from(grid.querySelectorAll('.task-history.open'))
          .map(el => el.closest('.agent-card')?.id)
          .filter(Boolean)
      );

      grid.innerHTML = agents.map(buildCard).join('');

      // Restore expanded state
      expandedIds.forEach(cardId => {
        const card = document.getElementById(cardId);
        if (!card) return;
        card.querySelector('.task-history')?.classList.add('open');
        card.querySelector('.card-expand-arrow')?.classList.add('open');
      });

      document.getElementById('agent-count').textContent =
        `${agents.length} agent${agents.length === 1 ? '' : 's'}`;
    }

    // ── Toggle card history ────────────────────────────────────────────────
    window.toggleCard = function(cardId, btn) {
      const card = document.getElementById(cardId);
      if (!card) return;
      const history = card.querySelector('.task-history');
      if (!history) return;
      const isOpen = history.classList.contains('open');
      history.classList.toggle('open', !isOpen);
      btn.classList.toggle('open', !isOpen);
    };

    // ── Feed ───────────────────────────────────────────────────────────────
    function prependFeedItem(event) {
      const feed = document.getElementById('event-feed');

      // Remove empty state
      const empty = feed.querySelector('.feed-empty');
      if (empty) empty.remove();

      const item = document.createElement('div');
      item.className = 'feed-item';
      const statusClass = event.status === 'busy' ? 'busy' : 'idle';
      const now = new Date().toISOString();
      item.innerHTML = `
        <div class="feed-item-header">
          <div class="feed-agent-dot" style="background:${event.color || '#6b7280'};"></div>
          <span class="feed-agent-name">${escapeHtml(event.agentName)}</span>
          <span class="status-badge ${statusClass} feed-badge">${event.status}</span>
        </div>
        <div class="feed-message">${escapeHtml(event.message || event.currentTask || '')}</div>
        <div class="feed-time">${relativeTime(now)}</div>
      `;

      feed.insertBefore(item, feed.firstChild);
      feedCount++;

      // Trim feed to MAX_FEED
      while (feed.children.length > MAX_FEED) {
        feed.removeChild(feed.lastChild);
      }
    }

    // ── Initial load ───────────────────────────────────────────────────────
    async function loadAgents() {
      try {
        const res = await fetch('/api/agents');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const agents = await res.json();
        for (const a of agents) {
          agentsMap[a.agentId] = a;
        }
        renderAgents(agents);
      } catch (err) {
        console.error('[dashboard] Failed to load agents:', err);
        document.getElementById('agent-grid').innerHTML =
          '<div class="empty-grid">Failed to load agents. Retrying…</div>';
        setTimeout(loadAgents, 5000);
      }
    }

    // ── SSE ────────────────────────────────────────────────────────────────
    function connectSSE() {
      const es = new EventSource('/events');
      const dot = document.getElementById('conn-dot');
      const label = document.getElementById('conn-label');

      es.onopen = () => {
        dot.classList.add('connected');
        label.textContent = 'Live';
      };

      es.onmessage = (e) => {
        let data;
        try {
          data = JSON.parse(e.data);
        } catch {
          return;
        }

        // Update local state
        agentsMap[data.agentId] = {
          ...(agentsMap[data.agentId] || {}),
          ...data,
        };

        // Re-render grid from updated map
        renderAgents(Object.values(agentsMap));

        // Prepend to feed
        prependFeedItem(data);
      };

      es.onerror = () => {
        dot.classList.remove('connected');
        label.textContent = 'Reconnecting…';
      };
    }

    // ── Boot ───────────────────────────────────────────────────────────────
    loadAgents().then(() => connectSSE());
  </script>
</body>
</html>
