<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Agent Orchestrator — Live Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #1a1a2e;
      --surface:   #16213e;
      --accent:    #0f3460;
      --teal:      #00d4aa;
      --amber:     #fdcb6e;
      --text:      #e8e8f0;
      --muted:     #6b6b8a;
      --border:    rgba(255,255,255,0.07);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    /* SSE connection indicator */
    .sse-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .sse-dot.connected {
      background: var(--teal);
      animation: pulse-green 2s ease-in-out infinite;
    }

    .sse-dot.disconnected {
      background: var(--muted);
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,212,170,0.5); }
      50%       { opacity: 0.85; box-shadow: 0 0 0 5px rgba(0,212,170,0); }
    }

    .sse-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    /* ── Main two-column layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Agent grid (left, ~62%) ── */
    .agent-section {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    #agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 14px;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 13px;
    }

    /* ── Agent card ── */
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid #3a3a5c;
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
      user-select: none;
      opacity: 0.85;
    }

    .agent-card:hover {
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .agent-card.busy {
      border-left-color: #00d4aa;
      opacity: 1;
      animation: pulse-border 2.4s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: -2px 0 12px rgba(0, 212, 170, 0.15); }
      50%       { box-shadow: -2px 0 18px rgba(0, 212, 170, 0.35); }
    }

    /* Card top row: name + role + badge */
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .card-avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
      color: #fff;
    }

    .card-meta {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-role {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .status-badge::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      display: block;
    }

    .status-badge.idle {
      background: #2a2a4a;
      color: #6b6b8a;
    }

    .status-badge.idle::before {
      background: #6b6b8a;
    }

    .status-badge.busy {
      background: #003d30;
      color: #00d4aa;
    }

    .status-badge.busy::before {
      background: #00d4aa;
      animation: pulse-dot 1.6s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Current task — only rendered when agent is busy */
    .card-task {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }

    .card-task.active {
      color: var(--text);
    }

    /* Expand toggle */
    .card-expand {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--muted);
      border: none;
      background: none;
      cursor: pointer;
      padding: 2px 0;
    }

    .card-expand:hover {
      color: var(--text);
    }

    .card-expand .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 9px;
    }

    .card-expand.open .arrow {
      transform: rotate(180deg);
    }

    /* Task history panel */
    .card-history {
      display: none;
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .card-history.open {
      display: block;
    }

    .history-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-row:last-child {
      border-bottom: none;
    }

    .history-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 3px;
      flex-shrink: 0;
    }

    .history-dot.completed { background: var(--teal); }
    .history-dot.failed    { background: #e17055; }
    .history-dot.in_progress { background: var(--amber); }
    .history-dot.pending   { background: var(--muted); }

    .history-text {
      flex: 1;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-ts {
      font-size: 9px;
      color: rgba(136,136,136,0.6);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .history-empty {
      font-size: 10px;
      color: var(--muted);
      padding: 4px 0;
    }

    /* ── Activity feed (right panel, fixed 340px) ── */
    .feed-panel {
      width: 340px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .feed-header {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      flex-shrink: 0;
    }

    #activity-feed {
      flex: 1;
      overflow-y: auto;
    }

    .feed-empty {
      padding: 24px 16px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* Feed item */
    .feed-item {
      padding: 10px 16px;
      border-top: 1px solid #1e2d50;
      animation: slide-in 0.25s ease-out;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .feed-item-top {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .feed-agent-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .feed-agent-name {
      font-weight: 600;
      font-size: 11px;
      color: var(--text);
    }

    .feed-status-badge {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 99px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .feed-status-badge.busy {
      background: #003d30;
      color: #00d4aa;
    }

    .feed-status-badge.idle {
      background: #2a2a4a;
      color: #6b6b8a;
    }

    .feed-message {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      padding-left: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-time {
      font-size: 9px;
      color: rgba(136,136,136,0.6);
      padding-left: 14px;
      margin-top: 3px;
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar        { width: 4px; }
    ::-webkit-scrollbar-track  { background: transparent; }
    ::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div class="header-left">
      <div class="sse-indicator">
        <div class="sse-dot disconnected" id="sse-dot"></div>
        <span class="sse-label" id="sse-label">CONNECTING</span>
      </div>
      <span class="header-title">Multi-Agent Orchestrator</span>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <div class="main">

    <!-- Agent grid -->
    <section class="agent-section">
      <div id="agent-grid">
        <div class="empty-state">Loading agents…</div>
      </div>
    </section>

    <!-- Activity feed -->
    <aside class="feed-panel">
      <div class="feed-header">Activity Feed</div>
      <div id="activity-feed">
        <div class="feed-empty">Waiting for events…</div>
      </div>
    </aside>

  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    const agentsMap = {};          // id → AgentStatus (from /api/agents)
    const agentTasksMap = {};      // id → last 3 tasks from /api/tasks
    let feedCount = 0;
    const MAX_FEED = 20;
    let tsTimers = [];             // ISO strings for relative-time elements

    // ── Helpers ────────────────────────────────────────────────────────────────

    function esc(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function initials(name) {
      return String(name || '?')
        .split(/[\s\-_]+/)
        .map(w => w[0] || '')
        .join('')
        .toUpperCase()
        .slice(0, 2) || '??';
    }

    function relTime(iso) {
      if (!iso) return '';
      const diff = Date.now() - new Date(iso).getTime();
      const s = Math.floor(Math.abs(diff) / 1000);
      if (s < 60) return `${s}s ago`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      return `${h}h ago`;
    }

    const ROLE_COLORS = {
      developer:       '#f59e0b',
      designer:        '#6366f1',
      product_manager: '#3b82f6',
      qa_engineer:     '#ec4899',
      project_manager: '#8b5cf6',
    };

    function roleColor(role) {
      return ROLE_COLORS[role] || '#6b7280';
    }

    function statusDotClass(status) {
      if (status === 'completed')  return 'completed';
      if (status === 'failed')     return 'failed';
      if (status === 'in_progress') return 'in_progress';
      return 'pending';
    }

    // ── Build agent card HTML ──────────────────────────────────────────────────

    function buildCardHTML(agent) {
      const statusClass = (agent.status === 'busy') ? 'busy' : 'idle';
      const isBusy      = agent.status === 'busy';
      const color       = roleColor(agent.role);
      const roleLabel   = String(agent.role || '').replace(/_/g, ' ');
      const tasks       = agentTasksMap[agent.id] || [];

      // Only render the task line when the agent is busy
      const taskHTML = isBusy && agent.currentTask
        ? `<div class="card-task active" title="${esc(agent.currentTask)}">${esc(agent.currentTask)}</div>`
        : '';

      const historyRows = tasks.length
        ? tasks.map(t => `
            <div class="history-row">
              <div class="history-dot ${esc(statusDotClass(t.status))}"></div>
              <div class="history-text" title="${esc(t.instruction)}">${esc(t.instruction)}</div>
              <div class="history-ts" data-ts="${esc(t.completedAt || t.createdAt)}">${relTime(t.completedAt || t.createdAt)}</div>
            </div>
          `).join('')
        : '<div class="history-empty">No completed tasks yet</div>';

      return `
        <div class="card-header">
          <div class="card-avatar" style="background:${color}22;color:${color};">${esc(initials(agent.name))}</div>
          <div class="card-meta">
            <div class="card-name">${esc(agent.name)}</div>
            <div class="card-role">${esc(roleLabel)}</div>
          </div>
          <span class="status-badge ${esc(statusClass)}">${esc(statusClass)}</span>
        </div>
        ${taskHTML}
        <button class="card-expand" onclick="toggleHistory(this)" type="button">
          <span>Task history</span>
          <span class="arrow">▼</span>
        </button>
        <div class="card-history">${historyRows}</div>
      `;
    }

    // ── Render / update agent card ─────────────────────────────────────────────

    function upsertCard(agent) {
      const grid   = document.getElementById('agent-grid');
      const cardId = 'card-' + agent.id;
      let card     = document.getElementById(cardId);

      // Remove placeholder
      const empty = grid.querySelector('.empty-state');
      if (empty) empty.remove();

      if (!card) {
        card = document.createElement('div');
        card.id        = cardId;
        card.className = 'agent-card ' + (agent.status === 'busy' ? 'busy' : '');
        card.setAttribute('data-agent-id', agent.id);
        card.innerHTML = buildCardHTML(agent);
        grid.appendChild(card);
      } else {
        // Preserve expanded state before re-render
        const histEl   = card.querySelector('.card-history');
        const isOpen   = histEl && histEl.classList.contains('open');
        const btnEl    = card.querySelector('.card-expand');
        const btnOpen  = btnEl && btnEl.classList.contains('open');

        card.className = 'agent-card ' + (agent.status === 'busy' ? 'busy' : '');
        card.innerHTML = buildCardHTML(agent);

        // Restore expanded state
        if (isOpen) {
          const newHist = card.querySelector('.card-history');
          const newBtn  = card.querySelector('.card-expand');
          if (newHist) newHist.classList.add('open');
          if (newBtn && btnOpen) newBtn.classList.add('open');
        }
      }
    }

    function renderAgents(agents) {
      for (const a of agents) {
        agentsMap[a.id] = a;
        upsertCard(a);
      }
    }

    // ── Toggle card history ────────────────────────────────────────────────────

    function toggleHistory(btn) {
      const card = btn.closest('.agent-card');
      if (!card) return;
      const hist = card.querySelector('.card-history');
      if (!hist) return;
      const open = hist.classList.toggle('open');
      btn.classList.toggle('open', open);
    }

    // ── Activity feed ──────────────────────────────────────────────────────────

    function prependFeedItem(event) {
      const feed = document.getElementById('activity-feed');

      const empty = feed.querySelector('.feed-empty');
      if (empty) empty.remove();

      const item       = document.createElement('div');
      item.className   = 'feed-item';
      const statusCls  = event.status === 'busy' ? 'busy' : 'idle';
      const color      = event.color || roleColor(event.role || '');
      const now        = new Date().toISOString();
      const msgText    = event.message || event.currentTask || '';

      item.innerHTML = `
        <div class="feed-item-top">
          <div class="feed-agent-dot" style="background:${esc(color)};"></div>
          <span class="feed-agent-name">${esc(event.agentName)}</span>
          <span class="feed-status-badge ${esc(statusCls)}">${esc(event.status)}</span>
        </div>
        <div class="feed-message" title="${esc(msgText)}">${esc(msgText)}</div>
        <div class="feed-time" data-ts="${esc(now)}">${relTime(now)}</div>
      `;

      feed.insertBefore(item, feed.firstChild);
      feedCount++;

      while (feed.children.length > MAX_FEED) {
        feed.removeChild(feed.lastChild);
      }
    }

    // ── Relative-time refresh ──────────────────────────────────────────────────

    function refreshRelativeTimes() {
      document.querySelectorAll('[data-ts]').forEach(el => {
        el.textContent = relTime(el.getAttribute('data-ts'));
      });
    }

    // ── Initial data load ──────────────────────────────────────────────────────

    async function loadInitial() {
      try {
        const [agentsRes, tasksRes] = await Promise.all([
          fetch('/api/agents'),
          fetch('/api/tasks?limit=50'),
        ]);

        if (agentsRes.ok) {
          const agents = await agentsRes.json();
          renderAgents(agents);
        }

        if (tasksRes.ok) {
          const tasks = await tasksRes.json();
          // Group last 3 completed tasks per agent
          // Build name→id map from agentsMap
          const nameToId = {};
          for (const [id, a] of Object.entries(agentsMap)) {
            nameToId[a.name] = id;
          }

          // Group tasks
          for (const t of tasks) {
            const agentId = nameToId[t.agentName];
            if (!agentId) continue;
            if (!agentTasksMap[agentId]) agentTasksMap[agentId] = [];
            if (agentTasksMap[agentId].length < 3) {
              agentTasksMap[agentId].push(t);
            }
          }

          // Re-render cards with history
          for (const [id, agent] of Object.entries(agentsMap)) {
            upsertCard(agent);
          }
        }
      } catch (err) {
        console.error('[dashboard] Initial load error:', err);
      }
    }

    // ── SSE connection ─────────────────────────────────────────────────────────

    function setSSEStatus(connected) {
      const dot   = document.getElementById('sse-dot');
      const label = document.getElementById('sse-label');
      if (connected) {
        dot.className   = 'sse-dot connected';
        label.textContent = 'LIVE';
      } else {
        dot.className   = 'sse-dot disconnected';
        label.textContent = 'RECONNECTING';
      }
    }

    let retryDelay = 3000;

    function connectSSE() {
      setSSEStatus(false);
      const es = new EventSource('/events');

      es.onopen = () => {
        setSSEStatus(true);
        retryDelay = 3000;
      };

      // Named event: agents snapshot
      es.addEventListener('agents', (e) => {
        try {
          const agents = JSON.parse(e.data);
          renderAgents(agents);
        } catch (err) {
          console.error('[dashboard] agents event parse error:', err);
        }
      });

      // Named event: tasks
      es.addEventListener('tasks', (e) => {
        try {
          const tasks = JSON.parse(e.data);
          // Build name→id map
          const nameToId = {};
          for (const [id, a] of Object.entries(agentsMap)) {
            nameToId[a.name] = id;
          }
          // Reset and repopulate task history (last 3 per agent)
          const newMap = {};
          for (const t of tasks) {
            const agentId = nameToId[t.agentName];
            if (!agentId) continue;
            if (!newMap[agentId]) newMap[agentId] = [];
            if (newMap[agentId].length < 3) newMap[agentId].push(t);
          }
          Object.assign(agentTasksMap, newMap);
          // Re-render cards
          for (const [id, agent] of Object.entries(agentsMap)) {
            upsertCard(agent);
          }
        } catch (err) {
          console.error('[dashboard] tasks event parse error:', err);
        }
      });

      // Unnamed message: agent update pushed by emitAgentUpdate()
      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (!data.agentId) return;

          // Merge into agentsMap using agentId as key (could be UUID or slug)
          // Try to find existing agent by matching agentId
          let matched = null;
          for (const [id, a] of Object.entries(agentsMap)) {
            if (id === data.agentId || a.name.toLowerCase().replace(/\s+/g, '-') === data.agentId) {
              matched = id;
              break;
            }
          }
          if (matched) {
            agentsMap[matched] = {
              ...agentsMap[matched],
              status:      data.status,
              currentTask: data.currentTask || '',
              updatedAt:   new Date().toISOString(),
            };
            upsertCard(agentsMap[matched]);
          }

          prependFeedItem(data);
        } catch (err) {
          console.error('[dashboard] SSE message parse error:', err);
        }
      };

      es.onerror = () => {
        setSSEStatus(false);
        es.close();
        console.warn('[dashboard] SSE disconnected — reconnecting in', retryDelay, 'ms');
        setTimeout(() => {
          retryDelay = Math.min(retryDelay * 2, 30000);
          connectSSE();
        }, retryDelay);
      };
    }

    // ── Boot ───────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      await loadInitial();
      connectSSE();
      setInterval(refreshRelativeTimes, 30000);
    });
  </script>
</body>
</html>
